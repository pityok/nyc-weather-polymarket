<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NYC Weather Polymarket Dashboard</title>
  <style>
    body{font-family:Arial,sans-serif;margin:20px;background:#0b1020;color:#eaf0ff}
    h1,h2{margin:8px 0}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(280px,1fr));gap:12px}
    .card{background:#131a2f;border:1px solid #253053;border-radius:10px;padding:12px}
    table{width:100%;border-collapse:collapse}
    td,th{padding:6px;border-bottom:1px solid #253053;text-align:left}
    select,input{background:#0f1630;color:#fff;border:1px solid #33406a;padding:6px;border-radius:6px}
    .muted{opacity:.8;font-size:12px}
  </style>
</head>
<body>
  <h1>NYC Weather × Polymarket</h1>
  <div class="muted" id="updated"></div>

  <div class="card" style="margin:10px 0">
    <label>Horizon:
      <select id="horizon"><option>today</option><option selected>tomorrow</option><option>day2</option></select>
    </label>
    <label style="margin-left:12px">Date (YYYY-MM-DD):
      <input id="date" />
    </label>
    <label style="margin-left:12px">City:
      <select id="citySelect"><option value="nyc">NYC</option><option value="london">London</option></select>
    </label>
  </div>

  <div class="grid">
    <div class="card">
      <h2>Сводная таблица</h2>
      <table id="summaryTable"></table>
    </div>
    <div class="card">
      <h2>Топ BET сигналов</h2>
      <table id="betsTable"></table>
    </div>
    <div class="card">
      <h2>Карточки моделей</h2>
      <div id="models"></div>
    </div>
    <div class="card">
      <h2>История run</h2>
      <table id="history"></table>
    </div>
    <div class="card">
      <h2>Эволюция прогноза</h2>
      <div class="muted" id="evolutionMeta"></div>
      <table id="evolutionTable"></table>
    </div>
    <div class="card">
      <h2>Качество моделей (7d)</h2>
      <table id="qualityTable"></table>
    </div>
  </div>

<script>
function todayYmd(){return new Date().toISOString().slice(0,10)}
async function load(){
  const date = document.getElementById('date').value || todayYmd();
  const cityId = document.getElementById('citySelect').value || 'nyc';

  const [summaryRes, signalsRes, marketCurRes, marketFixRes, snapRes, evolutionRes, qualityRes] = await Promise.all([
    fetch(`/api/summary?date=${date}&cityId=${cityId}`),
    fetch(`/api/signals?date=${date}&cityId=${cityId}`),
    fetch(`/api/market?date=${date}&type=current&cityId=${cityId}`),
    fetch(`/api/market?date=${date}&type=fixed_1800_msk&cityId=${cityId}`),
    fetch(`/dashboard/snapshot?includeHistory=true&historyLimit=10&cityId=${cityId}`),
    fetch(`/api/evolution?date=${date}&cityId=${cityId}`),
    fetch(`/api/model-quality?windowDays=7&cityId=${cityId}`),
  ]);

  if(!summaryRes.ok){
    document.getElementById('updated').innerText = `Ошибка загрузки summary (${summaryRes.status})`;
    return;
  }
  const summary = await summaryRes.json();
  const signals = await signalsRes.json();
  const marketCur = await marketCurRes.json();
  const marketFix = await marketFixRes.json();
  const snap = await snapRes.json();
  const evolution = evolutionRes.ok ? await evolutionRes.json() : { versions: [], deltas: [] };
  const quality = qualityRes.ok ? await qualityRes.json() : { models: [] };

  document.getElementById('updated').innerText = `Last updated UTC: ${new Date().toISOString()} | MSK: ${new Date().toLocaleString('sv-SE',{timeZone:'Europe/Moscow'})}`;

  const cur = marketCur.items?.[0]; const fix = marketFix.items?.[0];
  document.getElementById('summaryTable').innerHTML = `<tr><th>Источник</th><th>Есть данные</th></tr>
    <tr><td>Рынок сейчас</td><td>${cur ? 'yes' : 'no'}</td></tr>
    <tr><td>Рынок 18:00 MSK</td><td>${fix ? 'yes' : 'no'}</td></tr>
    <tr><td>Consensus AI</td><td>${summary.consensus?.length || 0}</td></tr>
    <tr><td>Signals</td><td>${summary.signals?.length || 0}</td></tr>`;

  const bets = (signals.items||[]).filter(s=>s.recommendation==='bet').sort((a,b)=>b.edge-a.edge).slice(0,10);
  document.getElementById('betsTable').innerHTML = `<tr><th>Range</th><th>Edge</th><th>AI</th><th>Market</th></tr>` +
    bets.map(b=>`<tr><td>${b.rangeKey}</td><td>${b.edge.toFixed(2)}</td><td>${b.aiProb.toFixed(2)}</td><td>${b.marketProb.toFixed(2)}</td></tr>`).join('');

  const forecasts = summary.forecasts || [];
  const grouped = {};
  forecasts.forEach(f=>{grouped[f.modelName]=grouped[f.modelName]||0; grouped[f.modelName]++});
  document.getElementById('models').innerHTML = Object.keys(grouped).map(k=>`<div>${k}: ${grouped[k]} прогноз(ов)</div>`).join('') || 'Нет данных';

  document.getElementById('history').innerHTML = `<tr><th>ID</th><th>Horizon</th><th>Target</th></tr>` +
    (snap.history||[]).map(r=>`<tr><td>${r.id.slice(0,8)}</td><td>${r.horizon}</td><td>${String(r.targetDate).slice(0,10)}</td></tr>`).join('');

  // Evolution block: versions + deltas
  const versions = evolution.versions || [];
  const deltas = evolution.deltas || [];
  document.getElementById('evolutionMeta').innerText = `Версий: ${versions.length} | Дельт: ${deltas.length}`;
  document.getElementById('evolutionTable').innerHTML =
    `<tr><th>#</th><th>MSK</th><th>Horizon</th><th>Top</th><th>Δtop</th></tr>` +
    versions.map((v,i)=>{
      const delta = deltas[i-1];
      const topChanged = delta && delta.topRangeChanged ? `⬅ ${delta.topRangePrev}` : '';
      return `<tr><td>${i}</td><td>${v.requestDatetimeMsk||''}</td><td>${v.horizon}</td><td>${v.topRange||'?'}</td><td class="muted">${topChanged}</td></tr>`;
    }).join('') || '<tr><td colspan="5" class="muted">Нет данных</td></tr>';

  // Quality scoreboard
  const qModels = quality.models || [];
  document.getElementById('qualityTable').innerHTML =
    `<tr><th>Model</th><th>Week</th><th>Weight%</th><th>HitRate</th><th>Brier</th></tr>` +
    qModels.map(m=>`<tr><td>${m.modelId}</td><td>${m.weekStartDate||''}</td><td>${m.weight.toFixed(2)}</td><td>${m.metrics?.hitRate!=null?(m.metrics.hitRate*100).toFixed(1)+'%':'—'}</td><td>${m.metrics?.brierScore!=null?m.metrics.brierScore.toFixed(4):'—'}</td></tr>`).join('') ||
    '<tr><td colspan="5" class="muted">Нет данных (запустите backtest)</td></tr>';
}
document.getElementById('date').value=todayYmd();
load();
setInterval(load, 60000);
</script>
</body>
</html>
